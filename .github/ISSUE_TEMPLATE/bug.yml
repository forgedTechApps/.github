name: Bug Report
description: Something is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Complete all required fields. Incomplete bug reports will be closed.

  - type: textarea
    id: description
    attributes:
      label: What is broken?
      description: Clear description of the problem. What did you expect? What happened instead?
      placeholder: |
        Expected: [describe expected behaviour]
        Actual: [describe what actually happened]
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the bug. Be specific — "it doesn't work" is not reproducible.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "critical — system unusable, data loss, security issue"
        - "high — major feature broken, no workaround"
        - "medium — feature partially broken, workaround exists"
        - "low — minor issue, cosmetic, or edge case"
    validations:
      required: true

  - type: dropdown
    id: affected-product
    attributes:
      label: Affected product
      options:
        - FORGE (iOS)
        - eleven11 (Flutter)
        - Alula
        - NetworkPulse
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what is relevant to your product.
      value: |
        - Product version:
        - OS / platform:
        - Device (if mobile):
        - Browser (if web):
        - Relevant env vars (redact any secrets):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste relevant log output. Redact any API keys or sensitive data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, links to related issues, anything else relevant.
    validations:
      required: false
