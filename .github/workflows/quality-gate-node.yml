name: Reusable — Quality Gate (Node.js / TypeScript)

# ─────────────────────────────────────────────────────────────────────────────
# Called by product repos via:
#
#   jobs:
#     quality-gate:
#       uses: forgedTechApps/.github/.github/workflows/reusable-quality-gate-node.yml@v1
#       with:
#         node-version: '20'
#         unit-coverage-threshold: '80'
#         integration-coverage-threshold: '70'
#       secrets: inherit
#
# Inputs let each product repo tune what it needs without forking the workflow.
# Secrets are inherited from the calling repo — set them there, not here.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:

      node-version:
        description: 'Node.js version'
        type: string
        default: '20'
        required: false

      unit-coverage-threshold:
        description: 'Minimum line coverage % for unit tests — CI fails below this'
        type: string
        default: '80'
        required: false

      integration-coverage-threshold:
        description: 'Minimum line coverage % for integration tests — CI fails below this'
        type: string
        default: '70'
        required: false

      run-owasp:
        description: 'Run OWASP Dependency-Check (disable for speed in dev branches)'
        type: boolean
        default: true
        required: false

      run-sonar:
        description: 'Run SonarCloud analysis'
        type: boolean
        default: true
        required: false

      run-e2e:
        description: 'Run E2E tests (disable on feature branches for speed)'
        type: boolean
        default: false
        required: false

      build-command:
        description: 'Build command'
        type: string
        default: 'npm run build'
        required: false

      unit-test-command:
        description: 'Unit test command with coverage'
        type: string
        default: 'npm run test:unit'
        required: false

      integration-test-command:
        description: 'Integration test command with coverage'
        type: string
        default: 'npm run test:integration'
        required: false

      e2e-test-command:
        description: 'E2E test command'
        type: string
        default: 'npm run test:e2e'
        required: false

      e2e-coverage-threshold:
        description: 'Minimum line coverage % for E2E tests — set to 0 to disable (opt-in)'
        type: string
        default: '0'
        required: false

      working-directory:
        description: 'Working directory (default: repo root)'
        type: string
        default: '.'
        required: false

    secrets:
      SONAR_TOKEN:
        required: false
      NVD_API_KEY:
        required: false

    outputs:
      build-status:
        description: 'Build outcome: success or failure'
        value: ${{ jobs.quality-gate.outputs.build-status }}

jobs:
  quality-gate:
    name: Quality Gate (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    outputs:
      build-status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      # ── Gate 1: TypeScript ──────────────────────────────────────────────
      - name: TypeScript typecheck
        run: npm run typecheck

      # ── Gate 2: Lint ────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── Gate 3: OWASP Dependency-Check ──────────────────────────────────
      - name: OWASP Dependency-Check
        if: inputs.run-owasp
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: ${{ inputs.working-directory }}
          format: HTML
          out: reports/dependency-check
          args: >-
            --suppression .owasp/dependency-check-suppression.xml
            --failOnCVSS 7
            --enableRetired
            --nodeAuditSkipDevDependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: inputs.run-owasp && always()
        with:
          name: dependency-check-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/reports/dependency-check
          retention-days: 30

      # ── Gate 4: Unit tests + coverage ───────────────────────────────────
      # Fast, isolated — no DB, no network. Must pass before integration runs.
      - name: Run unit tests with coverage
        run: ${{ inputs.unit-test-command }}
        env:
          NODE_ENV: test

      - name: Check unit test coverage threshold
        run: |
          COVERAGE=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            console.log(s.total.lines.pct);
          " 2>/dev/null || echo "0")
          echo "Unit coverage: ${COVERAGE}% (threshold: ${{ inputs.unit-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.unit-coverage-threshold }}" | bc -l) )); then
            echo "❌ Unit coverage ${COVERAGE}% is below threshold ${{ inputs.unit-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Unit coverage ${COVERAGE}% meets threshold"

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/coverage/junit*.xml
            **/test-results/unit*.xml
          comment_mode: always
          check_name: 'Unit Test Results'

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

      # ── Gate 5: Integration tests + coverage ────────────────────────────
      # Hits real services (DB, external APIs). Runs after unit tests pass.
      - name: Run integration tests with coverage
        run: ${{ inputs.integration-test-command }}
        env:
          NODE_ENV: test

      - name: Check integration test coverage threshold
        run: |
          COVERAGE=$(node -e "
            const s = require('./coverage-integration/coverage-summary.json');
            console.log(s.total.lines.pct);
          " 2>/dev/null || echo "0")
          echo "Integration coverage: ${COVERAGE}% (threshold: ${{ inputs.integration-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.integration-coverage-threshold }}" | bc -l) )); then
            echo "❌ Integration coverage ${COVERAGE}% is below threshold ${{ inputs.integration-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Integration coverage ${COVERAGE}% meets threshold"

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/test-results/integration*.xml'
          comment_mode: always
          check_name: 'Integration Test Results'

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/coverage-integration
          retention-days: 7

      # ── Gate 6: E2E tests ────────────────────────────────────────────────
      # Full stack against a running instance. Opt-in per repo/branch.
      - name: Run E2E tests
        if: inputs.run-e2e
        run: ${{ inputs.e2e-test-command }}
        env:
          NODE_ENV: test

      - name: Check E2E coverage threshold
        if: inputs.run-e2e && inputs.e2e-coverage-threshold != '0'
        run: |
          COVERAGE=$(node -e "
            const s = require('./coverage-e2e/coverage-summary.json');
            console.log(s.total.lines.pct);
          " 2>/dev/null || echo "0")
          echo "E2E coverage: ${COVERAGE}% (threshold: ${{ inputs.e2e-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.e2e-coverage-threshold }}" | bc -l) )); then
            echo "❌ E2E coverage ${COVERAGE}% is below threshold ${{ inputs.e2e-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ E2E coverage ${COVERAGE}% meets threshold"

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: inputs.run-e2e && always()
        with:
          files: '**/test-results/e2e*.xml'
          comment_mode: always
          check_name: 'E2E Test Results'

      # ── Gate 7: npm audit ───────────────────────────────────────────────
      - name: npm audit
        run: npm audit --audit-level=moderate --omit=dev

      # ── Gate 8: SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud analysis
        if: inputs.run-sonar
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Gate 9: Build ───────────────────────────────────────────────────
      - name: Build
        id: build
        run: ${{ inputs.build-command }}

      - name: Verify build output
        run: |
          if [ -f "dist/index.js" ]; then
            echo "✅ dist/index.js present"
          elif [ -d ".next" ]; then
            echo "✅ .next build output present"
          elif [ -d "build" ]; then
            echo "✅ build/ output present"
          else
            echo "⚠️  No recognised build output found — verify manually"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: build-${{ github.run_id }}
          path: |
            ${{ inputs.working-directory }}/dist
            ${{ inputs.working-directory }}/.next
            ${{ inputs.working-directory }}/build
          retention-days: 1
          if-no-files-found: ignore
