name: Reusable — Quality Gate (.NET 8)

# ─────────────────────────────────────────────────────────────────────────────
# Called by .NET repos via:
#
#   jobs:
#     quality-gate:
#       uses: forgedTechApps/.github/.github/workflows/reusable-quality-gate-dotnet.yml@v1
#       with:
#         dotnet-version: '8.0.x'
#         solution-path: 'MyApp.sln'
#         unit-coverage-threshold: '80'
#         integration-coverage-threshold: '70'
#       secrets: inherit
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:

      dotnet-version:
        description: '.NET SDK version'
        type: string
        default: '8.0.x'
        required: false

      solution-path:
        description: 'Path to .sln or .csproj file'
        type: string
        default: '.'
        required: false

      unit-test-project-pattern:
        description: 'Glob pattern for unit test projects'
        type: string
        default: '**/*.Unit.Tests.csproj'
        required: false

      integration-test-project-pattern:
        description: 'Glob pattern for integration test projects'
        type: string
        default: '**/*.Integration.Tests.csproj'
        required: false

      unit-coverage-threshold:
        description: 'Minimum line coverage % for unit tests'
        type: string
        default: '80'
        required: false

      integration-coverage-threshold:
        description: 'Minimum line coverage % for integration tests'
        type: string
        default: '70'
        required: false

      run-sonar:
        description: 'Run SonarCloud analysis'
        type: boolean
        default: true
        required: false

      run-owasp:
        description: 'Run OWASP Dependency-Check'
        type: boolean
        default: true
        required: false

      run-integration-tests:
        description: 'Run integration tests (in addition to unit tests)'
        type: boolean
        default: true
        required: false

      working-directory:
        description: 'Working directory'
        type: string
        default: '.'
        required: false

    secrets:
      SONAR_TOKEN:
        required: false
      NVD_API_KEY:
        required: false

jobs:
  quality-gate:
    name: Quality Gate (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ inputs.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-path }}

      # ── Gate 1: Build ───────────────────────────────────────────────────
      - name: Build
        run: |
          dotnet build ${{ inputs.solution-path }} \
            --no-restore \
            --configuration Release \
            -p:TreatWarningsAsErrors=true

      # ── Gate 2: Format check ────────────────────────────────────────────
      - name: dotnet format check
        run: |
          dotnet format ${{ inputs.solution-path }} \
            --verify-no-changes \
            --no-restore \
            || (echo "❌ Code is not formatted. Run: dotnet format" && exit 1)

      # ── Gate 3: OWASP Dependency-Check ──────────────────────────────────
      - name: OWASP Dependency-Check
        if: inputs.run-owasp
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: ${{ inputs.working-directory }}
          format: HTML
          out: reports/dependency-check
          args: >-
            --failOnCVSS 7
            --enableRetired
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: inputs.run-owasp && always()
        with:
          name: dependency-check-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/reports/dependency-check
          retention-days: 30

      # ── Gate 4: NuGet vulnerability audit ──────────────────────────────
      - name: dotnet list package --vulnerable
        run: |
          dotnet list ${{ inputs.solution-path }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "❌ Vulnerable NuGet packages found"
            cat vuln-report.txt
            exit 1
          fi
          echo "✅ No vulnerable packages found"

      # ── Gate 5: Unit tests + coverage ───────────────────────────────────
      # No external services — pure logic only.
      - name: Run unit tests with coverage
        run: |
          dotnet test ${{ inputs.solution-path }} \
            --no-build \
            --configuration Release \
            --filter "Category=Unit|FullyQualifiedName~Unit" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory UnitTestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/UnitTestResults/**/*.trx'
          check_name: 'Unit Test Results (.NET)'

      - name: Check unit coverage threshold
        run: |
          COVERAGE=$(find UnitTestResults -name "coverage.cobertura.xml" | head -1 | xargs -I{} python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('{}')
          rate = float(tree.getroot().get('line-rate', 0)) * 100
          print(f'{rate:.1f}')
          " 2>/dev/null || echo "0")
          echo "Unit coverage: ${COVERAGE}% (threshold: ${{ inputs.unit-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.unit-coverage-threshold }}" | bc -l) )); then
            echo "❌ Unit coverage ${COVERAGE}% below threshold ${{ inputs.unit-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Unit coverage ${COVERAGE}% meets threshold"

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-${{ github.run_id }}
          path: '**/UnitTestResults/**/*.xml'
          retention-days: 7

      # ── Gate 6: Integration tests + coverage ─────────────────────────────
      # Hits real services — DB, external APIs. Runs after unit tests pass.
      - name: Run integration tests with coverage
        if: inputs.run-integration-tests
        run: |
          dotnet test ${{ inputs.solution-path }} \
            --no-build \
            --configuration Release \
            --filter "Category=Integration|FullyQualifiedName~Integration" \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory IntegrationTestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: inputs.run-integration-tests && always()
        with:
          files: '**/IntegrationTestResults/**/*.trx'
          check_name: 'Integration Test Results (.NET)'

      - name: Check integration coverage threshold
        if: inputs.run-integration-tests
        run: |
          COVERAGE=$(find IntegrationTestResults -name "coverage.cobertura.xml" | head -1 | xargs -I{} python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('{}')
          rate = float(tree.getroot().get('line-rate', 0)) * 100
          print(f'{rate:.1f}')
          " 2>/dev/null || echo "0")
          echo "Integration coverage: ${COVERAGE}% (threshold: ${{ inputs.integration-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.integration-coverage-threshold }}" | bc -l) )); then
            echo "❌ Integration coverage ${COVERAGE}% below threshold ${{ inputs.integration-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Integration coverage ${COVERAGE}% meets threshold"

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: inputs.run-integration-tests && always()
        with:
          name: integration-coverage-${{ github.run_id }}
          path: '**/IntegrationTestResults/**/*.xml'
          retention-days: 7

      # ── Gate 7: SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud analysis
        if: inputs.run-sonar
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
