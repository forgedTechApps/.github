name: Test Reusable macOS

on:
  workflow_call:
    inputs:
      scheme:
        type: string
        required: true
      run-tests:
        type: boolean
        default: false
        required: false
      coverage-threshold:
        type: string
        default: '80'
        required: false
    secrets:
      TEST_SECRET:
        required: false
    outputs:
      build-status:
        description: 'Build outcome'
        value: ${{ jobs.test.outputs.build-status }}

jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    outputs:
      build-status: ${{ steps.build.outcome }}
    defaults:
      run:
        working-directory: '.'
    steps:
      - name: Run tests
        if: inputs.run-tests
        run: echo "scheme=${{ inputs.scheme }}"
      - name: Check coverage
        if: inputs.run-tests
        run: |
          echo "threshold=${{ inputs.coverage-threshold }}"
      - name: Build
        id: build
        run: echo "building"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ${{ inputs.scheme }}/file1.txt
            ${{ inputs.scheme }}/file2.txt
          retention-days: 7
          if-no-files-found: ignore
