name: Test Reusable macOS

on:
  workflow_call:
    inputs:
      scheme:
        type: string
        required: true
      run-tests:
        type: boolean
        default: false
        required: false
      coverage-threshold:
        type: string
        default: '80'
        required: false
    secrets:
      TEST_SECRET:
        required: false

jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: '.'
    steps:
      - name: Run tests
        if: inputs.run-tests
        run: echo "scheme=${{ inputs.scheme }}"
      - name: Check coverage
        if: inputs.run-tests
        run: |
          echo "threshold=${{ inputs.coverage-threshold }}"
      - name: Always run
        if: always()
        run: echo "done"
