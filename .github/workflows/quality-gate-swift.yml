name: Reusable — Quality Gate (Swift / iOS)

# ─────────────────────────────────────────────────────────────────────────────
# Called by Swift/iOS repos via:
#
#   jobs:
#     quality-gate:
#       uses: forgedTechApps/.github/.github/workflows/reusable-quality-gate-swift.yml@v1
#       with:
#         xcode-version: 'latest-stable'
#         scheme: 'FORGE'
#         destination: 'platform=iOS Simulator,name=iPhone 15,OS=latest'
#         unit-coverage-threshold: '80'
#         integration-coverage-threshold: '70'
#       secrets: inherit
#
# Note: iOS builds require macOS runners — these are 10x the cost of
# ubuntu runners (~$0.08/min vs $0.008/min on GitHub Actions).
# This workflow always runs on macos-latest — budget accordingly.
# For free tier: 2,000 macOS minutes/month. A typical run is 8-12 minutes.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:

      xcode-version:
        description: 'Xcode version (e.g. latest-stable, 15.2)'
        type: string
        default: 'latest-stable'
        required: false

      scheme:
        description: 'Xcode scheme to build and test'
        type: string
        required: true

      destination:
        description: 'xcodebuild destination string'
        type: string
        default: 'platform=iOS Simulator,name=iPhone 15,OS=latest'
        required: false

      unit-coverage-threshold:
        description: 'Minimum line coverage % for unit tests'
        type: string
        default: '80'
        required: false

      integration-coverage-threshold:
        description: 'Minimum line coverage % for UI/integration tests'
        type: string
        default: '70'
        required: false

      run-sonar:
        description: 'Run SonarCloud analysis'
        type: boolean
        default: true
        required: false

      run-swiftlint:
        description: 'Run SwiftLint'
        type: boolean
        default: true
        required: false

      run-ui-tests:
        description: 'Run UI / integration tests (separate XCUITest scheme)'
        type: boolean
        default: false
        required: false

      ui-test-scheme:
        description: 'Xcode scheme for UI/integration tests (if separate from unit scheme)'
        type: string
        default: ''
        required: false

      working-directory:
        description: 'Working directory'
        type: string
        default: '.'
        required: false

    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  # ── Linux job: lint (×1) ────────────────────────────────────────────────
  # SwiftLint (Linux Docker image) doesn't need Xcode/macOS. Running it on
  # ubuntu keeps the ×10 macOS runner doing only what genuinely requires it
  # (compile + simulator test). Saves ~2-4 min ×10 per run.
  # (issue: org-wide CI minute reduction)
  #
  # No dependency scan here: osv-scanner has no Swift Package Manager extractor
  # (Package.resolved is unsupported — it errors with "could not determine
  # extractor"), so OSV can't scan SwiftPM deps. If SwiftPM dependency scanning
  # is wanted, use GitHub's dependency-review / Dependabot instead.
  lint:
    name: Lint (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ── SwiftLint (Linux via official Docker image) ─────────────────────
      # The realm/swiftlint image ENTRYPOINT is already `swiftlint`, so `args:`
      # is arguments only. Pass `--config <wd>/.swiftlint.yml` and NO path: a
      # bare path overrides the config's `included:` and finds nothing
      # ("No lintable files found at paths: '.'"). The config's own included/
      # excluded paths then drive what's linted, relative to the mounted repo.
      - name: SwiftLint
        if: inputs.run-swiftlint
        uses: docker://ghcr.io/realm/swiftlint:latest
        with:
          args: lint --strict --config ${{ inputs.working-directory }}/.swiftlint.yml

  quality-gate:
    name: Quality Gate (Swift/iOS)
    runs-on: macos-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Shallow by default; SonarCloud blame wants full history, so deepen
          # only when Sonar runs. Full clone on the ×10 runner is pure waste otherwise.
          fetch-depth: ${{ inputs.run-sonar && 0 || 1 }}

      - name: Select Xcode ${{ inputs.xcode-version }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Cache SPM dependencies + resolved source packages ───────────────
      # Avoids re-fetching + re-compiling every SPM dependency on the ×10
      # runner each run. Keyed on Package.resolved. Highest-ROI macOS change.
      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # ── Gate 3: Resolve SPM dependencies ────────────────────────────────
      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "${{ inputs.scheme }}" \
            | grep -E "warning:|error:|resolved" || true

      # ── Gate 4: Build ───────────────────────────────────────────────────
      - name: Build
        run: |
          xcodebuild build \
            -scheme "${{ inputs.scheme }}" \
            -destination "${{ inputs.destination }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color || xcodebuild build \
              -scheme "${{ inputs.scheme }}" \
              -destination "${{ inputs.destination }}"

      # ── Gate 5: Unit tests + coverage ───────────────────────────────────
      # XCTest unit tests — fast, no UI, no network.
      - name: Run unit tests with coverage
        run: |
          xcodebuild test \
            -scheme "${{ inputs.scheme }}" \
            -destination "${{ inputs.destination }}" \
            -enableCodeCoverage YES \
            -resultBundlePath UnitTestResults.xcresult \
            -only-testing:"${{ inputs.scheme }}Tests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color --report junit --output unit-test-results.xml \
            || xcodebuild test \
              -scheme "${{ inputs.scheme }}" \
              -destination "${{ inputs.destination }}" \
              -enableCodeCoverage YES \
              -resultBundlePath UnitTestResults.xcresult \
              -only-testing:"${{ inputs.scheme }}Tests"

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: always()
        with:
          files: unit-test-results.xml
          check_name: 'Unit Test Results (Swift)'

      - name: Check unit coverage threshold
        run: |
          if [ ! -e UnitTestResults.xcresult ]; then
            echo "❌ UnitTestResults.xcresult not found — the test step did not produce a coverage bundle (build/test failure?)."
            exit 1
          fi
          # Fail loud on missing/empty coverage rather than silently coercing to
          # 0% — a 0% that's actually "no data" once masked a broken build.
          COVERAGE=$(xcrun xccov view --report --json UnitTestResults.xcresult \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          targets = data.get('targets', [])
          # Prefer the .app product target; never a *.xctest test bundle. Fall
          # back to the report's top-level lineCoverage aggregate.
          app = next((t for t in targets if t.get('name','').endswith('.app')), None)
          prod = app or next((t for t in targets if not t.get('name','').endswith('.xctest')), None)
          cov = (prod.get('lineCoverage') if prod else data.get('lineCoverage'))
          if cov is None:
              sys.stderr.write('no lineCoverage in xccov report\n'); sys.exit(2)
          print(f'{cov * 100:.1f}')
          ")
          if [ -z "$COVERAGE" ]; then
            echo "❌ Could not parse coverage from UnitTestResults.xcresult (no coverage data in bundle)."
            exit 1
          fi
          echo "Unit coverage: ${COVERAGE}% (threshold: ${{ inputs.unit-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.unit-coverage-threshold }}" | bc -l) )); then
            echo "❌ Unit coverage ${COVERAGE}% is below threshold ${{ inputs.unit-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Unit coverage ${COVERAGE}% meets threshold"

      # ── Gate 6: UI / integration tests + coverage ────────────────────────
      # XCUITest — runs on simulator, slower, opt-in.
      - name: Run UI / integration tests with coverage
        if: inputs.run-ui-tests
        run: |
          UI_SCHEME="${{ inputs.ui-test-scheme || inputs.scheme }}"
          xcodebuild test \
            -scheme "${UI_SCHEME}" \
            -destination "${{ inputs.destination }}" \
            -enableCodeCoverage YES \
            -resultBundlePath UITestResults.xcresult \
            -only-testing:"${UI_SCHEME}UITests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color --report junit --output ui-test-results.xml \
            || xcodebuild test \
              -scheme "${UI_SCHEME}" \
              -destination "${{ inputs.destination }}" \
              -enableCodeCoverage YES \
              -resultBundlePath UITestResults.xcresult \
              -only-testing:"${UI_SCHEME}UITests"

      - name: Publish UI test results
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: inputs.run-ui-tests && always()
        with:
          files: ui-test-results.xml
          check_name: 'UI Test Results (Swift)'

      - name: Check UI / integration coverage threshold
        if: inputs.run-ui-tests
        run: |
          if [ ! -e UITestResults.xcresult ]; then
            echo "❌ UITestResults.xcresult not found — the UI test step did not produce a coverage bundle (build/test failure?)."
            exit 1
          fi
          COVERAGE=$(xcrun xccov view --report --json UITestResults.xcresult \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          targets = data.get('targets', [])
          app = next((t for t in targets if t.get('name','').endswith('.app')), None)
          prod = app or next((t for t in targets if not t.get('name','').endswith('.xctest')), None)
          cov = (prod.get('lineCoverage') if prod else data.get('lineCoverage'))
          if cov is None:
              sys.stderr.write('no lineCoverage in xccov report\n'); sys.exit(2)
          print(f'{cov * 100:.1f}')
          ")
          if [ -z "$COVERAGE" ]; then
            echo "❌ Could not parse coverage from UITestResults.xcresult (no coverage data in bundle)."
            exit 1
          fi
          echo "UI/integration coverage: ${COVERAGE}% (threshold: ${{ inputs.integration-coverage-threshold }}%)"
          if (( $(echo "$COVERAGE < ${{ inputs.integration-coverage-threshold }}" | bc -l) )); then
            echo "❌ UI/integration coverage ${COVERAGE}% is below threshold ${{ inputs.integration-coverage-threshold }}%"
            exit 1
          fi
          echo "✅ UI/integration coverage ${COVERAGE}% meets threshold"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            ${{ inputs.working-directory }}/UnitTestResults.xcresult
            ${{ inputs.working-directory }}/UITestResults.xcresult
            ${{ inputs.working-directory }}/unit-test-results.xml
            ${{ inputs.working-directory }}/ui-test-results.xml
          retention-days: 7

      # ── Gate 7: SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud analysis
        if: inputs.run-sonar
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
