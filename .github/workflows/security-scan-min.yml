name: Reusable — Security Scan (minimal test)

on:
  workflow_call:
    inputs:
      language:
        description: 'CodeQL language'
        type: string
        default: 'javascript-typescript'
        required: false
      enable-zap:
        description: 'Run OWASP ZAP baseline scan'
        type: boolean
        default: false
        required: false
    secrets:
      NVD_API_KEY:
        required: false

jobs:
  codeql:
    name: CodeQL (${{ inputs.language }})
    if: inputs.language != 'swift'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo test
        run: echo "CodeQL ubuntu for ${{ inputs.language }}"

  codeql-swift:
    name: CodeQL (swift)
    if: inputs.language == 'swift'
    runs-on: macos-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo test
        run: echo "CodeQL Swift"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo test
        run: echo "Dependency audit"

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    if: always() && needs.dependency-audit.result == 'failure'

    steps:
      - name: Echo test
        run: echo "Notify"
