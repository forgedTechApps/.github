name: Reusable — Quality Gate (Node.js / TypeScript)

# ─────────────────────────────────────────────────────────────────────────────
# Called by product repos via:
#
#   jobs:
#     quality-gate:
#       uses: forgedTech/.github/.github/workflows/reusable-quality-gate-node.yml@main
#       with:
#         node-version: '20'
#         coverage-threshold: '80'
#       secrets: inherit
#
# Inputs let each product repo tune what it needs without forking the workflow.
# Secrets are inherited from the calling repo — set them there, not here.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:

      node-version:
        description: 'Node.js version'
        type: string
        default: '20'
        required: false

      coverage-threshold:
        description: 'Minimum line coverage % — CI fails below this'
        type: string
        default: '80'
        required: false

      run-owasp:
        description: 'Run OWASP Dependency-Check (disable for speed in dev branches)'
        type: boolean
        default: true
        required: false

      run-sonar:
        description: 'Run SonarCloud analysis'
        type: boolean
        default: true
        required: false

      build-command:
        description: 'Build command (default: npm run build)'
        type: string
        default: 'npm run build'
        required: false

      test-command:
        description: 'Test command with coverage (default: npm run test:ci)'
        type: string
        default: 'npm run test:ci'
        required: false

      working-directory:
        description: 'Working directory (default: repo root)'
        type: string
        default: '.'
        required: false

    secrets:
      SONAR_TOKEN:
        required: false
      NVD_API_KEY:
        required: false

    outputs:
      build-status:
        description: 'Build outcome: success or failure'
        value: ${{ jobs.quality-gate.outputs.build-status }}

jobs:
  quality-gate:
    name: Quality Gate (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    outputs:
      build-status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      # ── Gate 1: TypeScript ──────────────────────────────────────────────
      - name: TypeScript typecheck
        run: npm run typecheck

      # ── Gate 2: Lint ────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── Gate 3: OWASP Dependency-Check ──────────────────────────────────
      - name: OWASP Dependency-Check
        if: inputs.run-owasp
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: ${{ inputs.working-directory }}
          format: HTML
          out: reports/dependency-check
          args: >-
            --suppression .owasp/dependency-check-suppression.xml
            --failOnCVSS 7
            --enableRetired
            --nodeAuditSkipDevDependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: inputs.run-owasp && always()
        with:
          name: dependency-check-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/reports/dependency-check
          retention-days: 30

      # ── Gate 4: Tests + coverage ────────────────────────────────────────
      - name: Run tests with coverage
        run: ${{ inputs.test-command }}
        env:
          NODE_ENV: test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/coverage/junit*.xml
            **/test-results/*.xml
          comment_mode: always
          check_name: 'Test Results'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 7

      # ── Gate 5: npm audit ───────────────────────────────────────────────
      - name: npm audit
        run: npm audit --audit-level=moderate --omit=dev

      # ── Gate 6: SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud analysis
        if: inputs.run-sonar && secrets.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Gate 7: Build ───────────────────────────────────────────────────
      - name: Build
        id: build
        run: ${{ inputs.build-command }}

      - name: Verify build output
        run: |
          if [ -f "dist/index.js" ]; then
            echo "✅ dist/index.js present"
          elif [ -d ".next" ]; then
            echo "✅ .next build output present"
          elif [ -d "build" ]; then
            echo "✅ build/ output present"
          else
            echo "⚠️  No recognised build output found — verify manually"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: build-${{ github.run_id }}
          path: |
            ${{ inputs.working-directory }}/dist
            ${{ inputs.working-directory }}/.next
            ${{ inputs.working-directory }}/build
          retention-days: 1
          if-no-files-found: ignore
