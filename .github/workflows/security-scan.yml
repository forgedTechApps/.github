name: Reusable — Weekly Security Scan

# ─────────────────────────────────────────────────────────────────────────────
# Called by any repo for weekly deep security scanning via:
#
#   on:
#     schedule:
#       - cron: '0 2 * * 0'   # Sunday 02:00 UTC
#     workflow_dispatch:
#
#   jobs:
#     security-scan:
#       uses: forgedTechApps/.github/.github/workflows/security-scan.yml@v1
#       with:
#         language: javascript-typescript   # or: python, java, csharp, swift
#         enable-zap: false                 # true only for HTTP servers
#       secrets: inherit
#
# CodeQL supports: javascript-typescript, python, java, csharp, swift, go, ruby
# ZAP scanning only makes sense for HTTP services — disable for mobile/CLI apps
#
# Caller workflow must include in its top-level permissions:
#   permissions:
#     contents: read
#     security-events: write
#     issues: write         # required for notify job and ZAP issue writing
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:

      language:
        description: 'CodeQL language (javascript-typescript | python | csharp | swift | java)'
        type: string
        default: 'javascript-typescript'
        required: false

      enable-zap:
        description: 'Run OWASP ZAP baseline scan (only for HTTP servers)'
        type: boolean
        default: false
        required: false

      zap-target-url:
        description: 'URL for ZAP to scan (required if enable-zap is true)'
        type: string
        default: ''
        required: false

      zap-rules-file:
        description: 'Path to ZAP rules tsv file'
        type: string
        default: '.owasp/zap-rules.tsv'
        required: false

      working-directory:
        description: 'Working directory'
        type: string
        default: '.'
        required: false

    secrets:
      NVD_API_KEY:
        required: false

jobs:
  # ── CodeQL deep static analysis (non-Swift) ───────────────────────────────
  codeql:
    name: CodeQL (${{ inputs.language }})
    if: inputs.language != 'swift'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ inputs.language }}
          upload: always

  # ── CodeQL deep static analysis (Swift — macOS runner required) ───────────
  codeql-swift:
    name: CodeQL (swift)
    if: inputs.language == 'swift'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift
          upload: always

  # ── OWASP Dependency-Check (full weekly scan) ───────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OWASP Dependency-Check (full NVD refresh)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: ${{ inputs.working-directory }}
          format: 'HTML,SARIF'
          out: reports/dependency-check-weekly
          # NOTE: this action forwards `args` as a SINGLE token to the
          # entrypoint (action.yml: `- ${{ inputs.args }}`), so a folded
          # multi-line scalar became one malformed argument and dependency-check
          # printed usage + exited non-zero — meaning the scan never actually
          # ran (it just failed, which then tripped the notify job). Use the
          # `=` form so the threshold stays bound to its flag, on one line.
          args: --failOnCVSS=7 --enableRetired --enableExperimental
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/dependency-check-weekly
          category: dependency-check-weekly

      - name: Upload full report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-weekly-${{ github.run_id }}
          path: reports/dependency-check-weekly
          retention-days: 90

  # ── OWASP ZAP — dynamic scan (HTTP services only) ──────────────────────────
  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    if: inputs.enable-zap
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.zap-target-url }}
          rules_file_name: ${{ inputs.zap-rules-file }}
          allow_issue_writing: true
          issue_title: 'ZAP Security Findings — ${{ github.repository }}'
          token: ${{ github.token }}
          fail_action: false

      - name: Upload ZAP SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap.sarif
          category: zap-baseline

      - name: Fail on high findings
        if: always()
        run: |
          if [ -f zap.sarif ]; then
            HIGH=$(python3 -c "
          import json, sys
          data = json.load(open('zap.sarif'))
          count = sum(
            1 for run in data.get('runs', [])
            for result in run.get('results', [])
            if result.get('level') == 'error'
          )
          print(count)
          " 2>/dev/null || echo "0")
            if [ "$HIGH" -gt "0" ]; then
              echo "❌ $HIGH high-severity ZAP finding(s) — review Security tab"
              exit 1
            fi
            echo "✅ No high-severity ZAP findings"
          fi

  # ── Notify on failure ───────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    if: always() && needs.dependency-audit.result == 'failure'

    steps:
      - name: Open or update a single security-scan issue
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // De-duplicate: keep ONE open tracking issue, not one per weekly run.
            // The old behaviour opened a fresh issue every failing run, so a
            // persistently-broken scan (e.g. a tooling/infra failure) produced
            // weeks of duplicate noise.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security-scan',
              per_page: 1,
            });
            const body = [
              '## Weekly security scan failed',
              '',
              'The scheduled security scan did **not complete successfully**. This means',
              'the scan **failed to run or to publish results** — it does *not* by itself',
              'mean a vulnerability was found. Open the run and check which job failed:',
              '',
              `[View workflow run](${runUrl})`,
              '',
              '### Triage',
              '1. **Tooling/infra failure** (e.g. Docker-Hub pull timeout, malformed',
              '   dependency-check args, SARIF upload denied because code scanning is',
              '   not enabled) → fix the pipeline; there is nothing to triage in the code.',
              '2. **Genuine finding** (dependency-check `--failOnCVSS` threshold hit, or a',
              '   CodeQL/ZAP alert) → review the run log + the Security tab and remediate.',
              '',
              `_Last failing run: ${runUrl} (${new Date().toISOString().split('T')[0]})_`,
            ].join('\n');
            if (existing.data.length > 0) {
              // Update the existing tracking issue rather than opening another.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Scan failed again — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: 'Weekly security scan is failing',
                body,
                labels: ['security', 'security-scan', 'automated'],
              });
            }
