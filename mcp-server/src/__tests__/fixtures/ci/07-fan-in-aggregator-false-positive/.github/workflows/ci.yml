# Fan-in aggregator pattern. The real test jobs are ci-api / ci-shared / ci-web-e2e.
# `ci` is a transitive aggregator. `deploy-prod` needs [ci], which transitively requires
# all three quality gates. Issue #26 (https://github.com/forgedTechApps/.github/issues/26):
# check_ci_setup walks needs: recursively, so deploy-prod resolves to a quality gate. EXPECTED: clean.
name: CI
on: [push]
permissions:
  contents: read
jobs:
  ci-api:
    uses: forgedTechApps/.github/.github/workflows/quality-gate-node.yml@v1
  ci-shared:
    uses: forgedTechApps/.github/.github/workflows/quality-gate-node.yml@v1
  ci-web-e2e:
    uses: forgedTechApps/.github/.github/workflows/quality-gate-node.yml@v1
  ci:
    needs: [ci-api, ci-shared, ci-web-e2e]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - run: |
          if [[ "${{ needs.ci-api.result }}" != "success" ]] || \
             [[ "${{ needs.ci-shared.result }}" != "success" ]] || \
             [[ "${{ needs.ci-web-e2e.result }}" != "success" ]]; then
            exit 1
          fi
  deploy-prod:
    needs: [ci]
    if: needs.ci.result == 'success'
    uses: forgedTechApps/.github/.github/workflows/deploy-railway.yml@v1
