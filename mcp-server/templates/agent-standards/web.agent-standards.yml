version: 1
extends: forgedtech/org-defaults
repo: ${REPO}
language: ${LANGUAGE}

stack:
  package_manager: ${PACKAGE_MANAGER}
  test_runner: ${TEST_RUNNER}
  lint: ${LINT}
  format: ${FORMAT}
  build: ${BUILD}

style:
  - Replace with project-specific style rules.
  - "TypeScript: no `any` — use `unknown` and narrow."
  - "React: prefer Server Components in Next.js when no client interactivity needed."
  # Component-driven design (also in org defaults — restated to keep web focused on it)
  - "Atomic design ladder: atoms → molecules → organisms → templates → pages. Place each new component at the lowest level that fits."
  - "Components are composable, not configurable: prefer 5 small props that compose, over 1 prop with 12 variants."
  - "Stories before screens: each component has a Storybook (or equivalent) entry exercising every variant before being consumed by a screen."

  # ── Human-feeling UI (avoid the AI-generated look) ─────────────────────
  # The single biggest tell of AI-generated UI is filling every pixel and
  # treating spacing/symmetry as the goal. Restraint and intentional
  # hierarchy are the differentiators. See voice.md and design_references
  # for concrete numbers to imitate.
  - "Default to empty. Every pixel of UI must justify itself. AI wants to fill the screen — restraint is the differentiator. Sparse-and-decisive beats full-and-busy every time."
  - "Steal specific values, not vibes. From an app whose UI you admire, extract exact numbers — padding, font size, line height, radius — from a screenshot. Apply those numbers literally. 'Inspired by Linear' produces generic output; 'matches Linear's 12px card padding and 4px row gap' produces specific output."
  - "Mix sources. Take spacing rhythm from one app, button hierarchy from another, copy voice from a third. Cloning one app's whole design system trades AI-generic for app-clone — different problem, same lack of identity."
  - "Hard caps until earned: 2 fonts, 3 colors. A third font or fourth color must be argued for in writing — what semantic role does it play that the existing set can't?"
  - "Spacing carries meaning. Tight grouping = these belong together. Generous space = this matters. Uniform 16/24px gutters everywhere is the AI default — vary spacing on purpose."
  - "Custom icons over defaults. Swap the default icon set for a curated one (Phosphor, Lucide, custom). Where icons appear, they must add information, not decorate — fewer of them, more deliberate."
  - "Hierarchy via emphasis, not symmetry. Three equal cards = template. One prominent card + two quiet ones = hierarchy. The loud thing on the screen is loud because everything else is quiet."
  - "Microcopy is specific and in voice. Read voice.md before writing any user-facing string. 'Manage your tasks efficiently' is what AI writes; 'Add a task. We'll nag you later.' is what a person writes. Concrete verbs, no marketing."
  - "Avoid generic chrome. Default shadcn cards / borders / shadows are starting points, not finished UI — restyle the primitives to your design system before shipping."

architecture:
  rules:
    - Replace with architectural constraints.
    # ── Micro-frontend architecture ──────────────────────────────────────
    - "Split the app into vertically-owned features (auth, billing, dashboard, etc.). Each feature owns its routes, state, components, and tests."
    - "Cross-feature communication goes through a shared contract layer (typed events, URL routes, a shared API client) — features never import each other directly."
    - "A shared `@org/ui` package holds the design system (atoms / molecules / templates). Features compose from it; they never re-implement primitives."
    - "Build boundaries are explicit: each feature can be code-split (route-level chunk in Next.js, dynamic import elsewhere) so it loads independently."
    - "Module federation / runtime composition is opt-in per-feature. Static composition (npm workspace) is the default; only escalate to runtime when independent deploys are required."
    - "Shared dependencies (React, the design system) are deduped at build time. Version mismatches between features cause runtime breakage — pin via the workspace root."
  feature_path_pattern: "src/features/<Name>/"
  sensitive_paths:
    - "src/auth/**"
    - "next.config.*"
    - ".github/workflows/**"
    - "packages/ui/**"

test_coverage:
  unit_min: ${UNIT_COVERAGE}
  integration_min: ${INTEGRATION_COVERAGE}
  regression_required_for:
    - "src/auth/**"

review:
  explicit_approval_required_for:
    - ".github/workflows/**"
    - "next.config.*"
  no_force_push_branches:
    - main
    - dev

investigation:
  mode: soft
  min_read_write_ratio: 3

context_pointers:
  - README.md

ci:
  kind: web
  deploy_target: railway

branching:
  required_branches: [main, dev]
  default_branch: main
  feature_branch_pattern: "^(feat|fix|chore|docs|test|ci|refactor)/[a-z0-9._-]+$"
  mode: soft
