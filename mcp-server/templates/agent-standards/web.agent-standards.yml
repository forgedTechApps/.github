version: 1
repo: ${REPO}
language: ${LANGUAGE}

stack:
  package_manager: ${PACKAGE_MANAGER}
  test_runner: ${TEST_RUNNER}
  lint: ${LINT}
  format: ${FORMAT}
  build: ${BUILD}

style:
  - Replace with project-specific style rules.
  - TypeScript: no `any` — use `unknown` and narrow.
  - React: prefer Server Components in Next.js when no client interactivity needed.

architecture:
  rules:
    - Replace with architectural constraints.
  feature_path_pattern: "src/features/<Name>/"
  sensitive_paths:
    - "src/auth/**"
    - "next.config.*"
    - ".github/workflows/**"

test_coverage:
  unit_min: ${UNIT_COVERAGE}
  integration_min: ${INTEGRATION_COVERAGE}
  regression_required_for:
    - "src/auth/**"

review:
  explicit_approval_required_for:
    - ".github/workflows/**"
    - "next.config.*"
  no_force_push_branches:
    - main
    - dev

investigation:
  mode: soft
  min_read_write_ratio: 3

context_pointers:
  - README.md

ci:
  kind: web
  deploy_target: railway

branching:
  required_branches: [main, dev]
  default_branch: main
  feature_branch_pattern: "^(feat|fix|chore|docs|test|ci|refactor)/[a-z0-9._-]+$"
  mode: soft
