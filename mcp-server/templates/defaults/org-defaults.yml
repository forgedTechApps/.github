# forgedTechApps org-wide defaults.
# Extended by every project's .agent-standards.yml via `extends: forgedtech/org-defaults`.
#
# Merge semantics (project file wins):
#   - Scalars: project value overrides org value
#   - Arrays: org values + project values, deduplicated, project order first
#   - Objects: deep-merged
#
# ── Rule taxonomy (schema v2) ────────────────────────────────────────────
# This file contains only Invariants, Gates, and Practices.
# Principles (cultural rules: "functions do one thing", "names communicate
# intent", etc.) live in agent-standards/templates/PRINCIPLES.md, surfaced
# from each project's CLAUDE.md.
#
# Each rule has a tier:
#   - invariant: mechanically verifiable. Has check_command. Violation = bug.
#   - gate:      workflow checkpoint. Halts until satisfied.
#   - practice:  observable in records, not pre-checked. Drift-log catches.
#
# Plain-string rules (legacy form) are treated as tier: practice for
# backwards compatibility. New rules should use the object form.
#
# Deferred invariants carry { owner, target, issue }. check_paths surfaces
# them as DEFERRED_INVARIANT_NO_CHECK info findings.

# ── Model routing (logical names; CLAUDE.md maps to concrete IDs) ────
models:
  planning:
    model: opus
    effort: medium
  execution:
    model: sonnet
  # Fallback chain — use the next tier down (or up for haiku) when the
  # preferred model is unavailable (outage, overload, 529/overloaded responses).
  # opus → sonnet → haiku (step down); haiku → sonnet (step up).
  fallback_order: [opus, sonnet, haiku]

# ── Workflow gates (org-wide defaults) ──────────────────────────────────────
# definition_of_ready (Increment 2) + scope_expansion (Increment 3): opt-in
# per-project (Increment 4 propagated explicitly via project files).
#
# auth_change_asvs_artifact (Increment 5): rolled org-wide via this file.
# Auth changes are too infrequent to canary; the artifact only fires when an
# auth path is touched, so projects without auth paths see no effect.
gates:
  auth_change_asvs_artifact:
    enabled: true

style:
  # ── Code hygiene (invariants) ──────────────────────────────────────────
  - rule: "No commented-out code in committed changes. Delete it — git history is the archive."
    tier: invariant
    id: no_commented_code
    check_command: "mcp:check_codebase_hygiene"
    severity: warn
    # severity stays at 'warn' during the per-project cleanup-pass window
    # (Increment 6 part 2). Promote to 'error' after each project cleans up.

  - rule: "No TODOs without a linked tracking issue (e.g. `// TODO(#123): ...`). Untracked TODOs decay into noise."
    tier: invariant
    id: no_untracked_todos
    check_command: "mcp:check_codebase_hygiene"
    severity: warn

  - rule: "Conventional Commits: feat:, fix:, chore:, test:, docs:, ci:, refactor:, perf:, style:."
    tier: invariant
    id: conventional_commits
    check_command: "ci:commitlint"
    severity: error

  # ── Software design (practices) ────────────────────────────────────────
  - rule: "Three uses = extract to a shared module (packages/shared, common utilities)."
    tier: practice
    id: three_uses_extract

  # ── Workflow discipline (practices) ────────────────────────────────────
  - rule: "Plan before coding. State hypothesis + intended file changes + test approach BEFORE writing code. Confirm with the user if the change is non-trivial."
    tier: practice
    id: plan_before_code

  - rule: "Break tasks into 3–5 focused chunks. If a single task takes more than ~5 file changes or branches into >2 unrelated areas, split it."
    tier: practice
    id: task_chunking

  - rule: "Tests are non-negotiable; the order depends on the spec. Known behaviour (services, invariants, bug fixes) → test-first. Unknown behaviour (new feature, novel UI) → build-then-test in a fix-loop. Either way, tests ship with the change."
    tier: practice
    id: test_order_by_spec

  - rule: "After every two search/read operations, write findings somewhere durable (the plan, a TODO comment, a scratch note). Reading without recording loses context."
    tier: practice
    id: durable_findings

  - rule: "Be explicit about constraints: when picking a pattern, use the existing one in the codebase. When adding behaviour, change only the files needed. No new dependencies without justification."
    tier: practice
    id: explicit_constraints

  - rule: "Don't `gh pr merge --auto` unless the repo has branch protection with required status checks. Without it, `--auto` merges the instant the PR is mergeable — often before the real test jobs report. Poll the head commit's check-runs until the test jobs report success (`gh run watch <run-id> --exit-status`), then merge manually."
    tier: practice
    id: no_auto_merge_without_branch_protection

  - rule: "If you (the agent) made a mistake the user had to correct, propose a one-line addition to CLAUDE.md or .agent-standards.yml via propose_claude_md_rule. The user accepts or declines — never auto-edit."
    tier: practice
    id: propose_rule_after_correction

  # ── Review & readiness (practices) ─────────────────────────────────────
  - rule: "Stranger review for substantial diffs: before merging, run a fresh-context review. Spawn an agent (Task tool) given ONLY the diff plus the one-line requirement — withhold the plan, the conversation, and the intended approach. It reports where the code diverges from the stated goal, where it had to guess intent, and where a reader who didn't write it would stumble. The point is the clean context: a same-context self-review carries the author's intent and structurally cannot catch the intent-vs-code gap. Findings are questions to resolve, not blockers."
    tier: practice
    id: stranger_review

  - rule: "Production-readiness gate for deploy-bound changes: readiness = the org rules already enforced (OWASP/ASVS via check_http_security, check_secrets, check_client_bundle_secrets, check_cross_tenant_test, auth_change_asvs_artifact — a precondition, NOT re-reviewed here) PLUS the deploy-specific concerns those checks don't cover. Before shipping to a real environment, walk agent-standards/templates/PRODUCTION_READINESS.md: deploy-time security deltas (prod secrets actually set, prod rate-limits, no dev-permissive leakage), performance under load, observability (are new paths logged + metered?), runbook (how is this operated?), and rollback (how is it undone, and is the change backward-compatible enough to roll back safely?). A correct diff is not a deploy-ready one. Deploy-bound changes only; skip refactors, tests, docs. Advisory — surface gaps at review time, don't hard-block."
    tier: practice
    id: production_readiness_gate

  - rule: "GCOE instructions: when handing instructions to an implementing agent (a subagent prompt, or an executable plan step), cover Goal (what done looks like), Constraints (what must/must-not change, patterns to follow), Examples (paste the concrete existing pattern to mirror — do NOT just describe it), and Output format (file shape, function signature, test expectation). Examples is the usual miss: 'follow the existing repository pattern' is far weaker than pasting the existing repository. Show the pattern; don't describe it."
    tier: practice
    id: gcoe_instructions

  # ── Token / context discipline (practices) ─────────────────────────────
  - rule: "Output discipline: during investigation/execution be terse — tool calls carry the work, at most one short framing sentence per batch. No play-by-play, no recapping tool output that's already visible, no narrating transient tool/harness glitches (silently retry). Reserve fuller prose for genuine decisions/tradeoffs and the final result. Pair with verify-then-act, one step at a time: don't batch commit/push/merge before confirming each step from real output. The SessionStart hook re-asserts this each session."
    tier: practice
    id: output_discipline

  - rule: "Verify-then-act on real output. Never act on stale, garbled, or empty tool output — re-run the read until it returns fresh, coherent output before the next destructive step. Never guess an identifier you can derive: rev-parse the real SHA / read the real PR number / read the real branch, and pass that exact value forward. A `git reset --hard` or tag-move executed on a wrong/assumed value is the costliest mistake class; confirm the value first. Do NOT batch commit→push→merge→tag-move in one block — each step's success is the precondition for the next."
    tier: practice
    id: verify_then_act

  # ── Dispatch: single inline vs. one subagent vs. many (practices) ───────
  # Two orthogonal decisions. First decide IF the work leaves the main loop
  # (isolation), then decide IF it splits across multiple agents (independence).
  - rule: "Dispatch to a subagent for ISOLATION — not by default, by risk. Do the work INLINE in the main loop when it's short and single-surface (a few edits in one repo, a read/search, a one-shot fix). Move it into a DEDICATED subagent when it is long/stateful AND any of: spans multiple repos/branches/worktrees; runs many edit→build→verify cycles; or performs destructive/irreversible steps (git reset --hard, tag moves, force-push, bulk rewrites). The reason is blast-radius containment: a bad reset, a cwd mix-up, a flaky-tool artifact, or a cancelled batch then corrupts only the subagent's throwaway context, not the parent's accumulated state — and the unit gets its own clean verify-then-act loop. When unsure, inline is the default; escalate to a subagent when the work shows the triggers above, not preemptively."
    tier: practice
    id: dispatch_subagent_for_isolation

  - rule: "Use MULTIPLE agents only for genuinely INDEPENDENT units — one subagent is the default. Parallel/fan-out is justified ONLY when the units share no mutable state, have no ordering dependency, and cannot write-conflict — e.g. one agent per repo for an org-wide read/audit, or fan-out searches over disjoint areas. If units share state, must run in a fixed order, or could touch the same files/branches, run them SEQUENTIALLY in ONE subagent — parallel agents racing on shared state is a corruption source, not a speedup. Test before fanning out: 'could any two of these, run at the same time, read a half-written result or commit to the same place?' If yes, it is not parallelisable. Number of agents follows the number of independent units, not a target."
    tier: practice
    id: parallelize_only_independent

  - rule: "Across multiple checkouts, address each explicitly — never rely on cwd. When a task touches more than one repo/worktree, use `git -C <path> …` and `gh --repo <owner/repo> …` (and absolute paths for file tools) so a stale or surprising working directory can't send a commit, push, branch, or PR to the wrong repo. cwd-confusion crossing between checkouts is a recurring source of misplaced commits and 'pathspec did not match' errors."
    tier: practice
    id: explicit_repo_paths

  - rule: "Find before reading. Use Grep / search for symbols and keywords first. Don't Read whole files when a targeted range or rg search will answer the question."
    tier: practice
    id: find_before_read

  - rule: "Don't re-read files within a session unless you suspect they've changed. Scroll up — the prior result is still in context. Re-running the same Read is wasted context."
    tier: practice
    id: no_redundant_reads

  - rule: "Long file or huge log? Read with offset/limit, or filter through grep / head / tail."
    tier: practice
    id: offset_limit_for_long_files

  - rule: "Between unrelated tasks, prefer /clear over patching forward. Stale context drags accuracy and burns tokens."
    tier: practice
    id: clear_between_unrelated_tasks

  - rule: "When stale context is hurting accuracy, prefer /clear over /compact. Use /compact only when continuing the SAME task with significant accumulated history worth preserving."
    tier: practice
    id: compact_only_for_same_task

  - rule: "Route lightweight output sub-tasks to Haiku by default: annotations, PR comments, commit/PR summaries, changelog lines, status blurbs, and similar mechanical text-generation. When dispatching a subagent for one of these, pin model: haiku (Agent/Task call). This is a model tier BELOW the planning(opus)/execution(sonnet) split — those govern the main task; this governs the cheap output work spun off from it. Override to sonnet only when the sub-task genuinely needs judgment (e.g. summarising a large, subtle diff where a weak summary would mislead) — and say why. Default Haiku; escalate deliberately."
    tier: practice
    id: haiku_for_lightweight_subtasks

  - rule: "Model fallback on outage or overload: if the preferred tier (opus for planning, sonnet for execution) is unavailable — persistent 529/overloaded responses, reported outage, or session model forced to a different tier — step down to the next available tier in the chain: opus → sonnet → haiku. For haiku tasks, step up to sonnet if haiku is unavailable. Do NOT block work waiting for the preferred model; declare the fallback model in current_model on start_task/propose_change so drift logs reflect the actual tier used. Resume on the preferred model for the next session once availability is restored."
    tier: practice
    id: model_fallback_on_outage

style_ui:
  # ── UI / component-driven design ────────────────────────────────────────
  # Loaded only when the project's ci.kind is `mobile` or `web`.
  - rule: "Component-driven design: views composed from small, single-purpose, reusable components."
    tier: practice
    id: component_driven_design

  - rule: "A view file > 200 lines is a smell — extract subviews."
    tier: invariant
    id: view_size_limit
    check_command: "mcp:check_view_size"
    severity: warn

  - rule: "Design tokens (colors, spacing, typography, radii) come from a single source — never hardcode hex values, magic spacing numbers, or font sizes inside a component."
    tier: invariant
    id: design_tokens_only
    check_command: "mcp:check_design_consistency"
    severity: error

  - rule: "A shared component library is the home for cross-feature primitives. Feature folders consume from it; they never re-implement a Button, Card, Modal, etc."
    tier: practice
    id: shared_component_library

  - rule: "Storybook / catalog page / preview app for the component library when feasible."
    tier: practice
    id: component_catalog

architecture:
  rules:
    # ── Boundaries & inputs ────────────────────────────────────────────────
    - rule: "Input validation at every system boundary: HTTP, queue, file I/O, IPC. Validate once at the boundary; trust internally."
      tier: practice
      id: input_validation_at_boundary

    - rule: "Authorisation at the resource level, not just the route. Every read/write checks the requesting principal can act on THIS object."
      tier: practice
      id: authorisation_at_resource_level
      deferred:
        owner: "Carlos"
        target: "W18"
        reason: "Generic AST check infeasible. Mitigated via cross-tenant integration test as Invariant."
        issue: "https://github.com/forgedTechApps/.github/issues/7"

    - rule: "Multi-tenant projects: every query function in the data layer accepts the tenant id as a parameter. The mechanical check is a hint (severity: info) — signature heuristics produce too many false positives (row converters, factory functions, tenant-root queries, domain aliases) to use as a blocking gate. The load-bearing defense for cross-tenant leaks is the integration test below (cross_tenant_test_coverage)."
      tier: practice
      id: multi_tenant_query_isolation
      check_command: "mcp:check_tenant_isolation"
      severity: info
      # No-op when architecture.tenant_isolation is unset. When configured, surfaces
      # method signatures that don't take the tenant_id_field as a hint, not a block.
      # Demoted from invariant/error on 2026-05-28 after 100% false-positive rate on
      # Kurata + ~95% on eleven11v2. See issue #27 for the abandoned heuristics work.

    - rule: "Multi-tenant projects: a designated cross-tenant integration test asserts 403 for every authenticated route when called with a foreign tenant ID. The test row count keeps pace with new routes."
      tier: invariant
      id: cross_tenant_test_coverage
      check_command: "mcp:check_cross_tenant_test"
      severity: warn
      # Active when architecture.tenant_isolation.cross_tenant_test_file is set.
      # The mechanical proxy for OWASP A01 — generic AST check for resource-level
      # authorisation is impractical, so we verify the test inventory grows.
      #
      # Severity split (issue #33): the check distinguishes a binary, load-bearing
      # case from a fuzzy one. CROSS_TENANT_TEST_EMPTY (routes exist but the file
      # asserts no 403 at all) is an ERROR. CROSS_TENANT_TEST_UNDER_COVERAGE (the
      # assertion/route ratio is low) is an INFO hint, not a gate — both sides are
      # heuristic counts, so a low ratio is a prompt to look, not proof of a gap.
      # Use tenant_isolation.route_files_exclude to drop non-tenant route files
      # (auth, onboarding, self-service) from the denominator.

    - rule: "External HTTP calls must set explicit timeouts and have a documented failure mode (retry, circuit-break, fallback). No bare unbounded fetch()."
      tier: invariant
      id: external_http_has_timeout
      check_command: "mcp:check_http_timeouts"
      severity: warn
      # severity stays at 'warn' during the per-project cleanup-pass window.
      # Promote to 'error' after each project cleans up. Bypass via inline
      # '// agent-standards: allow-no-timeout <reason>'.

    - rule: "Logging never includes PII, credentials, tokens, or full request bodies. Mask or omit at the logger, not the call site. The mechanical check is a hint — regex on log statements near sensitive field names produces noise (legitimate user_id logging is fine). Verify findings manually."
      tier: practice
      id: no_pii_in_logs
      check_command: "mcp:check_log_pii"
      severity: info
      # Demoted from invariant/warn on 2026-05-28 — regex flags both real leaks
      # and harmless cases (opaque ID logging). Suppress via inline
      # '// agent-standards: allow-log-field <reason>'.

    # ── Secrets & config ───────────────────────────────────────────────────
    - rule: "Secrets via environment variables or a secret store ONLY. Never in committed files (.env, source, config). Pre-commit / CI scans must reject."
      tier: invariant
      id: no_committed_secrets
      check_command: "mcp:check_secrets"
      severity: error

    - rule: "All deployable services declare a complete .env.example documenting every required variable — no surprise config in production."
      tier: invariant
      id: env_example_present
      check_command: "mcp:check_env_example"
      severity: error

    - rule: "Service-role keys / admin tokens never flow to clients. Server-only."
      tier: invariant
      id: service_role_keys_not_in_client
      check_command: "mcp:check_client_bundle_secrets"
      severity: error
      # Run after `pnpm build` / `next build` etc — scans compiled output, not source.

    # ── Data integrity ─────────────────────────────────────────────────────
    - rule: "SQL: parameterised queries only. String concatenation into raw SQL is rejected. The mechanical check is a hint — many ORMs / query builders accept template-string syntax safely, and the regex can't tell the difference. Enforce in code review; rely on CodeQL/Semgrep for depth."
      tier: practice
      id: parameterised_queries_only
      check_command: "mcp:check_sql_injection"
      severity: warn
      # Demoted from invariant/error on 2026-05-28. Bypass: '// agent-standards:
      # allow-sql-concat <reason>'.

    - rule: "Schema migrations are forward-only and reversible (or document why not). Destructive migrations (DROP, NOT NULL on existing) require explicit user approval."
      tier: practice
      id: migrations_forward_only

    - rule: "Version every consumed interface with SemVer semantics — HTTP/edge APIs, published packages, the @v1 reusable-workflow tag, the MCP tool/schema surface. NON-breaking changes (additive: a new optional field, a new endpoint, a new optional input) are a MINOR (or patch) bump. BREAKING changes (removed/renamed field, changed response shape or semantics, a newly-required input, removed endpoint) are a MAJOR bump. A version bump alone is not enough: a breaking change requires (1) a deprecation window where old and new coexist, (2) a changelog/migration note saying what broke and how to migrate, and (3) coordinated rollout for shared surfaces that land in consumers immediately (the @v1 tag, org-defaults). Never repurpose an existing major version with a breaking change in place — cut the next major."
      tier: practice
      id: api_versioning_semver

    - rule: "Database access goes through a repository / data-access layer — UI / route handlers never touch the DB driver directly."
      tier: practice
      id: db_access_via_dal
      # Demoted from Invariant: a generic AST check across heterogeneous ORMs
      # (Drizzle / Prisma / SQLAlchemy / Django ORM / raw SQL) is impractical.
      # Cross-tenant integration test (cross_tenant_test_coverage) catches the
      # downstream effect when DB access bypasses the layer.

    # ── HTTP services ──────────────────────────────────────────────────────
    - rule: "HTTP services set security headers: Strict-Transport-Security, Content-Security-Policy, X-Content-Type-Options: nosniff, X-Frame-Options: DENY (or frame-ancestors), Referrer-Policy: strict-origin-when-cross-origin. The textual presence check is a hint — headers are often set by a reverse-proxy, CDN, or framework outside the scanned source."
      tier: practice
      id: http_security_headers
      check_command: "mcp:check_http_security"
      severity: info
      # Demoted from invariant/warn on 2026-05-28. Passes automatically when a
      # known headers library (helmet, fastify-helmet, django.middleware.security)
      # is detected. The dangerous-CORS combo remains an invariant — see
      # cors_explicit_origins below.

    - rule: "CORS allowlist is explicit per-origin. No `*` for endpoints that handle credentials."
      tier: invariant
      id: cors_explicit_origins
      check_command: "mcp:check_http_security"
      severity: error
      # Same check as http_security_headers — wildcard+credentials is the
      # dangerous combo flagged at severity: error.

    - rule: "Rate-limit every public endpoint. Document the limit; surface 429 with Retry-After."
      tier: practice
      id: public_endpoints_rate_limited

    # ── OWASP awareness ────────────────────────────────────────────────────
    - rule: "Auth changes reviewed against OWASP ASVS Level 1 minimum (https://owasp.org/www-project-application-security-verification-standard/). Attach asvs_review artifact to the task record."
      tier: gate
      id: auth_change_asvs_artifact
      check_command: "mcp:attach_asvs_review"
      severity: error
      deferred:
        owner: "Carlos"
        target: "W5"

    - rule: "Any change touching auth, input handling, data access, or templating triggers an OWASP Top 10 mental review (A01–A10)."
      tier: practice
      id: owasp_top_10_mental_review

  sensitive_paths:
    - "**/.env*"
    - "**/secrets/**"
    - "**/Dockerfile"
    - "**/docker-compose*.yml"
    - "**/wrangler.toml"
    - "**/migrations/**"

test_coverage:
  # Project files override these — these are floors, not ceilings.
  unit_min: 60
  integration_min: 40
  regression_required_for:
    - "**/auth/**"
    - "**/migrations/**"

review:
  explicit_approval_required_for:
    - "**/.env*"
    - "**/migrations/**"
    - "**/Dockerfile"
    - "**/wrangler.toml"
    - ".github/workflows/**"
  no_force_push_branches:
    - main
    - dev

investigation:
  # Soft by default — projects bump to hard for sensitive codebases.
  mode: soft
  min_read_write_ratio: 3

branching:
  required_branches: [main, dev]
  default_branch: main
  feature_branch_pattern: "^(feat|fix|chore|docs|test|ci|refactor|perf|style)/[a-z0-9._-]+$"
  mode: soft

# ── Vulnerability scanning (org policy) ────────────────────────────────────
# Enforced by the canonical .github/workflows/security-scan.yml +
# the dependency-audit step inside every quality-gate-*.yml.
#
# Required scans, run automatically on every PR via reusable workflows:
#   1. CodeQL SAST (security-extended + security-and-quality queries)
#   2. OWASP Dependency-Check (CVSS >= 7 fails the build)
#   3. OSV Scanner against language lockfiles (Swift Package.resolved, etc.)
#   4. (Optional, opt-in via security-scan.yml `enable-zap: true`) OWASP ZAP
#      baseline scan against deployed HTTP services
#
# If a scan must be suppressed, add an inline justification comment AND open
# a tracking issue. Never silently bypass.

# ── Framework / runtime end-of-life (org policy) ───────────────────────────
# check_framework_support reads each repo's DECLARED runtime version and
# compares it to the dates below. Within warn_within_months of EOL -> warn
# (FRAMEWORK_NEAR_EOL); past EOL -> error (FRAMEWORK_PAST_EOL).
#
# MAINTENANCE: these are upstream vendor dates — review quarterly and on any
# new major release. Dates are official LTS/release-track EOLs as published
# by each vendor (nodejs.org/en/about/previous-releases,
# learn.microsoft.com/lifecycle, devguide.python.org/versions). Key
# granularity matches how each runtime declares its version:
#   - node:   major        (.nvmrc / package.json engines -> "20")
#   - dotnet: major        (global.json / TargetFramework net8.0 -> "8")
#   - python: major.minor  (.python-version / requires-python -> "3.12")
#   - flutter/dart/swift:  no fixed vendor EOL calendar (only the latest
#       stable is supported). Left unconfigured -> the check reports
#       VERSION_UNKNOWN_EOL (info), not a false error. Add dated entries
#       only if the org adopts a pinned-support policy.
framework_support:
  warn_within_months: 6
  frameworks:
    - id: node
      eol:
        "16": "2023-09-11"
        "18": "2025-04-30"
        "20": "2026-04-30"
        "22": "2027-04-30"
        "24": "2028-04-30"
    - id: dotnet
      eol:
        "6": "2024-11-12"
        "7": "2024-05-14"
        "8": "2026-11-10"
        "9": "2026-05-12"
        "10": "2028-11-14"
    - id: python
      eol:
        "3.8": "2024-10-31"
        "3.9": "2025-10-31"
        "3.10": "2026-10-31"
        "3.11": "2027-10-31"
        "3.12": "2028-10-31"
        "3.13": "2029-10-31"
