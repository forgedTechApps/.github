# forgedTechApps org-wide defaults.
# Extended by every project's .agent-standards.yml via `extends: forgedtech/org-defaults`.
#
# Merge semantics (project file wins):
#   - Scalars: project value overrides org value
#   - Arrays: org values + project values, deduplicated, project order first
#   - Objects: deep-merged
#
# ── Rule taxonomy (schema v2) ────────────────────────────────────────────
# This file contains only Invariants, Gates, and Practices.
# Principles (cultural rules: "functions do one thing", "names communicate
# intent", etc.) live in agent-standards/templates/PRINCIPLES.md, surfaced
# from each project's CLAUDE.md.
#
# Each rule has a tier:
#   - invariant: mechanically verifiable. Has check_command. Violation = bug.
#   - gate:      workflow checkpoint. Halts until satisfied.
#   - practice:  observable in records, not pre-checked. Drift-log catches.
#
# Plain-string rules (legacy form) are treated as tier: practice for
# backwards compatibility. New rules should use the object form.
#
# Deferred invariants carry { owner, target, issue }. check_paths surfaces
# them as DEFERRED_INVARIANT_NO_CHECK info findings.

# ── Model routing (logical names; CLAUDE.md maps to concrete IDs) ────
models:
  planning:
    model: opus
    effort: medium
    fallback: [sonnet]
  execution:
    model: sonnet
    fallback: [opus]
  refactor:
    model: fable
    effort: medium
    fallback: [opus, sonnet]
  analysis:
    model: fable
    effort: medium
    fallback: [opus, sonnet]

# ── Workflow gates (org-wide defaults) ──────────────────────────────────────
# definition_of_ready (Increment 2) + scope_expansion (Increment 3): opt-in
# per-project (Increment 4 propagated explicitly via project files).
#
# auth_change_asvs_artifact (Increment 5): rolled org-wide via this file.
# Auth changes are too infrequent to canary; the artifact only fires when an
# auth path is touched, so projects without auth paths see no effect.
gates:
  auth_change_asvs_artifact:
    enabled: true

  # deployment_compat_review: before proposing a write that touches an API
  # surface (routes, schemas, Edge Functions, DTOs), the agent must confirm
  # backwards-compatibility between independently deployable surfaces.
  # Not enabled org-wide by default — projects with multiple surfaces opt in.
  # When enabled, propose_change against api_surface_paths blocks until
  # attach_deployment_compat_review is called on the active task.
  deployment_compat_review:
    enabled: false
    # Paths that constitute an API surface — a change here could break a consumer
    # that isn't redeployed at the same time. Projects should override this list.
    api_surface_paths:
      - "**/routes/**"
      - "**/api/**"
      - "**/edge-functions/**"
      - "**/supabase/functions/**"
      - "**/*.dto.ts"
      - "**/schema.ts"

style:
  # ── Output discipline (practice) ──────────────────────────────────────
  - rule: "During investigation and execution, be terse — let tool calls carry the work, at most one short framing sentence per batch. No play-by-play, no recapping tool output, no narrating transient glitches. Reserve fuller prose for genuine decisions/tradeoffs and the final result."
    tier: practice
    id: output_discipline

  # ── Code hygiene (invariants) ──────────────────────────────────────────
  - rule: "No commented-out code in committed changes. Delete it — git history is the archive."
    tier: invariant
    id: no_commented_code
    check_command: "mcp:check_codebase_hygiene"
    severity: warn
    # severity stays at 'warn' during the per-project cleanup-pass window
    # (Increment 6 part 2). Promote to 'error' after each project cleans up.

  - rule: "No TODOs without a linked tracking issue (e.g. `// TODO(#123): ...`). Untracked TODOs decay into noise."
    tier: invariant
    id: no_untracked_todos
    check_command: "mcp:check_codebase_hygiene"
    severity: warn

  - rule: "Conventional Commits: feat:, fix:, chore:, test:, docs:, ci:, refactor:, perf:, style:."
    tier: invariant
    id: conventional_commits
    check_command: "ci:commitlint"
    severity: error

  # ── Software design (practices) ────────────────────────────────────────
  - rule: "Three uses = extract to a shared module (packages/shared, common utilities)."
    tier: practice
    id: three_uses_extract

  # ── Workflow discipline (practices) ────────────────────────────────────
  - rule: "Plan before coding. State hypothesis + intended file changes + test approach BEFORE writing code. Confirm with the user if the change is non-trivial."
    tier: practice
    id: plan_before_code

  - rule: "Break tasks into 3–5 focused chunks. If a single task takes more than ~5 file changes or branches into >2 unrelated areas, split it."
    tier: practice
    id: task_chunking

  - rule: "Tests are non-negotiable; the order depends on the spec. Known behaviour (services, invariants, bug fixes) → test-first. Unknown behaviour (new feature, novel UI) → build-then-test in a fix-loop. Either way, tests ship with the change."
    tier: practice
    id: test_order_by_spec

  - rule: "After every two search/read operations, write findings somewhere durable (the plan, a TODO comment, a scratch note). Reading without recording loses context."
    tier: practice
    id: durable_findings

  - rule: "Be explicit about constraints: when picking a pattern, use the existing one in the codebase. When adding behaviour, change only the files needed. No new dependencies without justification."
    tier: practice
    id: explicit_constraints

  - rule: "If you (the agent) made a mistake the user had to correct, propose a one-line addition to CLAUDE.md or .agent-standards.yml via propose_claude_md_rule. The user accepts or declines — never auto-edit."
    tier: practice
    id: propose_rule_after_correction

  # ── Enforcement hygiene (practices + invariants) ───────────────────────
  # The four principles below address recurring failure patterns across projects.
  # Each principle in PRINCIPLES.md has a corresponding enforcement rule here.

  - rule: "Prose-only rules are not enforcement. Any rule in CLAUDE.md that has been violated more than once must graduate to a check, gate, hook, or interview-me question via propose_claude_md_rule. Writing a rule down is not the same as enforcing it."
    tier: practice
    id: prose_only_rules_must_graduate
    # Interview-me enforcement: the closing interview step must ask
    # "Did this task reveal a rule that needs enforcement but has none?"
    # If yes, the agent calls propose_claude_md_rule before closing the task.

  - rule: "Any quality threshold set below the org default must carry a target date and increment in the config comment (e.g. '# Target: 80% by 2026-09 — raise 5% per sprint'). New files added in a PR must individually meet the org default (unit_min: 80%) even when the project aggregate is below it."
    tier: practice
    id: coverage_thresholds_have_direction
    # Mechanical proxy: check_codebase_hygiene will surface a COVERAGE_BELOW_ORG_DEFAULT
    # finding when unit_min < 80 and no target comment exists in .agent-standards.yml.
    # Until that check lands, this is drift-log enforced via the interview-me closing step.

  - rule: "Any document that contains the phrase 'applies to ALL work' or equivalent must be listed in context_pointers. If it is not loaded at session start, it does not govern anything. Check context_pointers whenever writing or updating a governing document."
    tier: invariant
    id: governing_docs_in_context_pointers
    check_command: "mcp:check_paths"
    severity: warn
    # check_paths surfaces DEFERRED_INVARIANT_NO_CHECK for this rule today.
    # A future increment will add a heuristic: scan CLAUDE.md for 'applies to all'
    # and verify the referenced file appears in context_pointers.

  - rule: "A multi-site fix commit (same bug fixed across ≥2 files) must be followed in the same PR or the next by a check, hook, or interview-me question that would have caught the original violation. 'Fixed in code' and 'prevented from recurring' are different outcomes."
    tier: practice
    id: multi_site_fix_requires_guard
    # Interview-me enforcement: when closing a bugfix task where files_intended
    # contained ≥2 sibling files with the same fix pattern, ask:
    # "Is there now a check, hook, or DoR question that would catch this pattern
    # in a new file?" If no, call propose_claude_md_rule before closing.

  # ── Token / context discipline (practices) ─────────────────────────────
  - rule: "Find before reading. Use Grep / search for symbols and keywords first. Don't Read whole files when a targeted range or rg search will answer the question."
    tier: practice
    id: find_before_read

  - rule: "Don't re-read files within a session unless you suspect they've changed. Scroll up — the prior result is still in context. Re-running the same Read is wasted context."
    tier: practice
    id: no_redundant_reads

  - rule: "Long file or huge log? Read with offset/limit, or filter through grep / head / tail."
    tier: practice
    id: offset_limit_for_long_files

  - rule: "Between unrelated tasks, prefer /clear over patching forward. Stale context drags accuracy and burns tokens."
    tier: practice
    id: clear_between_unrelated_tasks

  - rule: "When stale context is hurting accuracy, prefer /clear over /compact. Use /compact only when continuing the SAME task with significant accumulated history worth preserving."
    tier: practice
    id: compact_only_for_same_task

style_ui:
  # ── UI / component-driven design ────────────────────────────────────────
  # Loaded only when the project's ci.kind is `mobile` or `web`.
  - rule: "Component-driven design: views composed from small, single-purpose, reusable components."
    tier: practice
    id: component_driven_design

  - rule: "A view file > 200 lines is a smell — extract subviews."
    tier: invariant
    id: view_size_limit
    check_command: "mcp:check_view_size"
    severity: warn

  - rule: "Design tokens (colors, spacing, typography, radii) come from a single source — never hardcode hex values, magic spacing numbers, or font sizes inside a component."
    tier: invariant
    id: design_tokens_only
    check_command: "mcp:check_design_consistency"
    severity: error

  - rule: "A shared component library is the home for cross-feature primitives. Feature folders consume from it; they never re-implement a Button, Card, Modal, etc."
    tier: practice
    id: shared_component_library

  - rule: "Storybook / catalog page / preview app for the component library when feasible."
    tier: practice
    id: component_catalog

  - rule: "Presentation text (labels, messages, error copy, empty states, button titles) is owned by the backend and served to the UI — never hardcoded in client code. This enables translations and copy updates without a UI deployment."
    tier: practice
    id: backend_owned_presentation_text
    # Mechanical proxy: interview-me UI branch question 5 asks whether any new
    # text is hardcoded in the UI. No AST check — judgment call at review time.

architecture:
  rules:
    # ── Boundaries & inputs ────────────────────────────────────────────────
    - rule: "Input validation at every system boundary: HTTP, queue, file I/O, IPC. Validate once at the boundary; trust internally."
      tier: practice
      id: input_validation_at_boundary

    - rule: "Authorisation at the resource level, not just the route. Every read/write checks the requesting principal can act on THIS object."
      tier: practice
      id: authorisation_at_resource_level
      # Mitigation: cross_tenant_test_coverage invariant (mcp:check_cross_tenant_test)
      # is the mechanical proxy. Issue #7 closed 2026-05-27.

    - rule: "Multi-tenant projects: every query function in the data layer accepts the tenant id as a parameter. Configure architecture.tenant_isolation to enable mechanical enforcement."
      tier: invariant
      id: multi_tenant_query_isolation
      check_command: "mcp:check_tenant_isolation"
      severity: error
      # No-op when architecture.tenant_isolation is unset. Active when configured.
      # Bypass via inline '// tenant-isolation: bypass <reason>' comment per method.

    - rule: "Multi-tenant projects: a designated cross-tenant integration test asserts 403 for every authenticated route when called with a foreign tenant ID. The test row count keeps pace with new routes."
      tier: invariant
      id: cross_tenant_test_coverage
      check_command: "mcp:check_cross_tenant_test"
      severity: warn
      # Active when architecture.tenant_isolation.cross_tenant_test_file is set.
      # The mechanical proxy for OWASP A01 — generic AST check for resource-level
      # authorisation is impractical, so we verify the test inventory grows.

    - rule: "External HTTP calls must set explicit timeouts and have a documented failure mode (retry, circuit-break, fallback). No bare unbounded fetch()."
      tier: invariant
      id: external_http_has_timeout
      check_command: "mcp:check_http_timeouts"
      severity: warn
      # severity stays at 'warn' during the per-project cleanup-pass window.
      # Promote to 'error' after each project cleans up. Bypass via inline
      # '// agent-standards: allow-no-timeout <reason>'.

    - rule: "Logging never includes PII, credentials, tokens, or full request bodies. Mask or omit at the logger, not the call site."
      tier: invariant
      id: no_pii_in_logs
      check_command: "mcp:check_log_pii"
      severity: warn
      # severity stays at 'warn' during the per-project cleanup-pass window.
      # Promote to 'error' after each project cleans up. Bypass via inline
      # '// agent-standards: allow-log-field <reason>'.

    # ── Secrets & config ───────────────────────────────────────────────────
    - rule: "Secrets via environment variables or a secret store ONLY. Never in committed files (.env, source, config). Pre-commit / CI scans must reject."
      tier: invariant
      id: no_committed_secrets
      check_command: "mcp:check_secrets"
      severity: error

    - rule: "All deployable services declare a complete .env.example documenting every required variable — no surprise config in production."
      tier: invariant
      id: env_example_present
      check_command: "mcp:check_env_example"
      severity: error

    - rule: "Service-role keys / admin tokens never flow to clients. Server-only."
      tier: invariant
      id: service_role_keys_not_in_client
      check_command: "mcp:check_client_bundle_secrets"
      severity: error
      # Run after `pnpm build` / `next build` etc — scans compiled output, not source.

    # ── Data integrity ─────────────────────────────────────────────────────
    - rule: "SQL: parameterised queries only. String concatenation in queries is rejected."
      tier: invariant
      id: parameterised_queries_only
      check_command: "mcp:check_sql_injection"
      severity: error
      # Regex catches the 80% case (template literals + SQL concat). Deeper
      # scanning (CodeQL, Semgrep) belongs in CI. Bypass: '// agent-standards:
      # allow-sql-concat <reason>'.

    - rule: "Schema migrations are forward-only and reversible (or document why not). Destructive migrations (DROP, NOT NULL on existing) require explicit user approval."
      tier: practice
      id: migrations_forward_only

    - rule: "Database access goes through a repository / data-access layer — UI / route handlers never touch the DB driver directly."
      tier: practice
      id: db_access_via_dal
      # Demoted from Invariant: a generic AST check across heterogeneous ORMs
      # (Drizzle / Prisma / SQLAlchemy / Django ORM / raw SQL) is impractical.
      # Cross-tenant integration test (cross_tenant_test_coverage) catches the
      # downstream effect when DB access bypasses the layer.

    # ── HTTP services ──────────────────────────────────────────────────────
    - rule: "HTTP services set security headers: Strict-Transport-Security, Content-Security-Policy, X-Content-Type-Options: nosniff, X-Frame-Options: DENY (or frame-ancestors), Referrer-Policy: strict-origin-when-cross-origin."
      tier: invariant
      id: http_security_headers
      check_command: "mcp:check_http_security"
      severity: warn
      # Combined with cors_explicit_origins in mcp:check_http_security. Passes
      # automatically when a known headers library (helmet, fastify-helmet,
      # django.middleware.security) is detected.

    - rule: "CORS allowlist is explicit per-origin. No `*` for endpoints that handle credentials."
      tier: invariant
      id: cors_explicit_origins
      check_command: "mcp:check_http_security"
      severity: error
      # Same check as http_security_headers — wildcard+credentials is the
      # dangerous combo flagged at severity: error.

    - rule: "Rate-limit every public endpoint. Document the limit; surface 429 with Retry-After."
      tier: practice
      id: public_endpoints_rate_limited

    # ── OWASP awareness ────────────────────────────────────────────────────
    - rule: "Auth changes reviewed against OWASP ASVS Level 1 minimum (https://owasp.org/www-project-application-security-verification-standard/). Attach asvs_review artifact to the task record."
      tier: gate
      id: auth_change_asvs_artifact
      check_command: "mcp:attach_asvs_review"
      severity: error
      # Implemented: attach_asvs_review is live in the MCP server (Increment 5).

    - rule: "Any change touching auth, input handling, data access, or templating triggers an OWASP Top 10 mental review (A01–A10)."
      tier: practice
      id: owasp_top_10_mental_review

    # ── Error handling ─────────────────────────────────────────────────────
    - rule: "Errors surface in place with a recoverable action — never silent, never navigate the user away. Every error state is designed, not accidental."
      tier: practice
      id: errors_recover_in_place
      # UI mechanical proxy: interview-me UI branch asks this. The principle
      # applies equally to API error responses, mobile error states, and CLI output.

    - rule: "Caught exceptions log the error type and a safe context description — never the raw input, request body, or user-supplied content. Error payloads are as likely to contain PII as success payloads."
      tier: practice
      id: error_logs_no_raw_input
      # Companion to no_pii_in_logs (which covers structured logs). This rule
      # specifically targets the exception-catch site where raw inputs are
      # tempting to include for debugging but unsafe to keep.

    - rule: "Every async operation has an explicit error path. Unhandled promise rejections, uncaught async exceptions, and silent swallowed errors are rejected at review. 'It probably won't fail' is not a failure mode."
      tier: practice
      id: explicit_async_error_path

  sensitive_paths:
    - "**/.env*"
    - "**/secrets/**"
    - "**/Dockerfile"
    - "**/docker-compose*.yml"
    - "**/wrangler.toml"
    - "**/migrations/**"

test_coverage:
  # Project files override these — these are floors, not ceilings.
  unit_min: 60
  integration_min: 40
  regression_required_for:
    - "**/auth/**"
    - "**/migrations/**"

review:
  explicit_approval_required_for:
    - "**/.env*"
    - "**/migrations/**"
    - "**/Dockerfile"
    - "**/wrangler.toml"
    - ".github/workflows/**"
  no_force_push_branches:
    - main
    - dev

investigation:
  # Soft by default — projects bump to hard for sensitive codebases.
  mode: soft
  min_read_write_ratio: 3

debugging:
  # ── Bug-fixing discipline (practices) ──────────────────────────────────
  # These rules address agent thrashing: jumping to fixes without a
  # hypothesis, bundling multiple changes, and failing to escalate when
  # an approach isn't working. Enforced via drift log; no mechanical check
  # is feasible (hypothesis is a written artifact, not a code pattern).
  rules:
    - rule: "Before touching any code on a bugfix, write a hypothesis: observed behaviour, suspected root cause, and predicted fix. The hypothesis must appear in the task record or a visible comment before the first edit. 'Try this and see' is not a hypothesis."
      tier: practice
      id: hypothesis_before_fix

    - rule: "One variable per fix attempt. Change one thing, run the tests, read the result. No bundled patches ('let me also try X while I'm here'). If the hypothesis was wrong, form a new one before the next attempt."
      tier: practice
      id: fix_one_variable

    - rule: "Three failed fix attempts on the same bug = mandatory stop. Do not attempt fix #4 without first questioning the approach: is the hypothesis wrong, is the architecture the real problem, does this need a different model or a human? Document the three attempts and the new direction before continuing."
      tier: practice
      id: three_strikes_escalate

prompt_injection:
  # ── Prompt injection defence (for projects that call an LLM) ───────────
  # Applies whenever a service, worker, or Edge Function passes external
  # content — user text, tool/MCP results, web scrapes, receipts, file
  # contents — to an LLM. "External" means anything that crossed a trust
  # boundary before reaching the call site.
  #
  # These are practices, not invariants: generic AST detection of injection
  # surfaces is impractical (same reason db_access_via_dal was demoted).
  # The mechanical proxy is check_codebase_hygiene patterns for AI call
  # sites, enabled per-project when an LLM chokepoint is configured.
  rules:
    - rule: "External content passed to an LLM is data, not instructions. Separate it from the system prompt with explicit delimiters and label it as untrusted (e.g. <user_content>, <tool_result>). Never interpolate raw external strings directly into the system prompt."
      tier: practice
      id: llm_external_content_delimited
      # The 'one chokepoint per provider' principle (PRINCIPLES.md) is the
      # structural defence: a single call site is the only place this needs
      # to be applied. Scattered call sites multiply the attack surface.

    - rule: "LLM call sites that accept external content must document their injection surface in a comment: what external sources feed this call, what the trust boundary is, and what the mitigation is. Undocumented call sites are invisible attack surfaces."
      tier: practice
      id: llm_injection_surface_documented
      # Example comment: '# injection-surface: user receipt text (untrusted).
      # Mitigation: content wrapped in <receipt> tags; system prompt is static.'
      # check_codebase_hygiene can pattern-match for AI SDK call sites lacking
      # this comment — enable per-project when LLM chokepoints are configured.

    - rule: "Tool and MCP results are treated as untrusted data regardless of source. A compromised or poisoned tool response can carry instructions; the LLM cannot distinguish these from legitimate content. Validate structure and type; don't trust the content."
      tier: practice
      id: tool_results_are_untrusted

    - rule: "LLM outputs that drive downstream actions (writes, API calls, code execution) must be validated before acting on them. An LLM output is a suggestion from an untrusted source, not a verified instruction. Parse and validate the structure; reject anything outside the expected schema."
      tier: practice
      id: llm_output_validated_before_action
      # The requirements-engineer's write-scope guard and propose/confirm gate
      # are the reference implementation of this rule. Any project where an
      # LLM output triggers a write, deletion, or external call must have an
      # equivalent structural guard — not just a prompt instruction to 'be careful'.

branching:
  required_branches: [main, dev]
  default_branch: main
  feature_branch_pattern: "^(feat|fix|chore|docs|test|ci|refactor|perf|style)/[a-z0-9._-]+$"
  mode: soft

  rules:
    - rule: "All work happens on a feature branch. Never commit directly to 'main' or 'dev'. Direct pushes to both are blocked by the org gitflow-enforce ruleset."
      tier: invariant
      id: branch_name_convention
      check_command: "mcp:check_branching"
      severity: error

# ── Vulnerability scanning (org policy) ────────────────────────────────────
# Enforced by the canonical .github/workflows/security-scan.yml +
# the dependency-audit step inside every quality-gate-*.yml.
#
# Required scans, run automatically on every PR via reusable workflows:
#   1. CodeQL SAST (security-extended + security-and-quality queries)
#   2. OWASP Dependency-Check (CVSS >= 7 fails the build)
#   3. OSV Scanner against language lockfiles (Swift Package.resolved, etc.)
#   4. (Optional, opt-in via security-scan.yml `enable-zap: true`) OWASP ZAP
#      baseline scan against deployed HTTP services
#
# If a scan must be suppressed, add an inline justification comment AND open
# a tracking issue. Never silently bypass.
