name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

  # Weekly deep security scan — runs independently of push/PR
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  issues: write

jobs:

  ci:
    if: github.event_name != 'schedule'
    uses: forgedTechApps/.github/.github/workflows/quality-gate-flutter.yml@v1
    with:
      flutter-version: '3.x'
      unit-coverage-threshold: '80'
      integration-coverage-threshold: '70'
      run-integration-tests: true
      build-android: true
      build-ios: false
    secrets: inherit

  # ── Weekly security scan ─────────────────────────────────────────────────
  security-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: forgedTechApps/.github/.github/workflows/security-scan.yml@v1
    with:
      # Flutter/Dart — use java as closest supported CodeQL language for Android interop
      language: java
      enable-zap: false
    secrets: inherit
