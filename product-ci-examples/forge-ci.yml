name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

  # Weekly deep security scan — runs independently of push/PR
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write
  issues: write

jobs:

  ci:
    if: github.event_name != 'schedule'
    uses: forgedTechApps/.github/.github/workflows/quality-gate-swift.yml@v1
    with:
      scheme: 'FORGE'
      destination: 'platform=iOS Simulator,name=iPhone 15,OS=latest'
      xcode-version: 'latest-stable'
      unit-coverage-threshold: '80'
      integration-coverage-threshold: '70'
      run-ui-tests: false
      ui-test-scheme: 'FORGEUITests'
    secrets: inherit

  # ── Weekly security scan ─────────────────────────────────────────────────
  security-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: forgedTechApps/.github/.github/workflows/security-scan.yml@v1
    with:
      language: swift
      enable-zap: false
    secrets: inherit
