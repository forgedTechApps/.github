name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

  # Weekly deep security scan — runs independently of push/PR
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Shared quality gate ───────────────────────────────────────────────────
  # All gates defined in forgedTechApps/.github — updated once, applies here automatically.
  ci:
    if: github.event_name != 'schedule'
    uses: forgedTechApps/.github/.github/workflows/quality-gate-node.yml@v1
    with:
      node-version: '20'
      unit-coverage-threshold: '80'
      integration-coverage-threshold: '70'
      unit-test-command: 'npm run test:unit'
      integration-test-command: 'npm run test:integration'
      # E2E only on merges to main or dev — not on every PR
      run-e2e: ${{ github.event_name == 'push' }}
      e2e-test-command: 'npm run test:e2e'
      build-command: 'npm run build'
    secrets: inherit

  # ── Regression tests ─────────────────────────────────────────────────────
  # Runs black-box HTTP tests against the built server artifact.
  # Only on merges to main or dev — not on every PR.
  regression:
    needs: ci
    if: >
      github.event_name != 'schedule' && (
        contains(fromJson('["refs/heads/main", "refs/heads/dev"]'), github.ref) ||
        contains(fromJson('["main", "dev"]'), github.base_ref)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist/

      - name: Run regression tests
        run: npm run test:regression
        env:
          NODE_ENV: test

  # ── Weekly security scan ─────────────────────────────────────────────────
  security-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: forgedTechApps/.github/.github/workflows/security-scan.yml@v1
    with:
      language: javascript-typescript
      enable-zap: true
      zap-target-url: ${{ secrets.RAILWAY_PUBLIC_URL }}
    secrets: inherit

  # ── Deploy to dev environment ─────────────────────────────────────────────
  # Runs on every merge to dev — deploys to local/staging Railway service.
  deploy-dev:
    needs: [ci, regression]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    uses: forgedTechApps/.github/.github/workflows/deploy-railway.yml@v1
    with:
      service-name: 'forge-pipe-mcp-dev'
      environment: 'development'
      run-health-check: false
    secrets: inherit

  # ── Deploy to production ──────────────────────────────────────────────────
  # Only runs on merge to main, only after ci AND regression pass.
  deploy:
    needs: [ci, regression]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: forgedTechApps/.github/.github/workflows/deploy-railway.yml@v1
    with:
      service-name: 'forge-pipe-mcp'
      environment: 'production'
      health-check-path: '/health'
    secrets: inherit
