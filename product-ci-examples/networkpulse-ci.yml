name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

  # Weekly deep security scan — runs independently of push/PR
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci:
    if: github.event_name != 'schedule'
    uses: forgedTechApps/.github/.github/workflows/reusable-quality-gate-node.yml@v1
    with:
      node-version: '20'
      unit-coverage-threshold: '80'
      integration-coverage-threshold: '70'
      unit-test-command: 'npm run test:unit'
      integration-test-command: 'npm run test:integration'
      # Chrome extensions have no E2E server target — disable
      run-e2e: false
      build-command: 'npm run build'
    secrets: inherit

  # ── Extension package verification ───────────────────────────────────────
  # Validates the built extension can be loaded into Chrome.
  # Runs after ci passes — only on merges to main or dev.
  validate-extension:
    needs: ci
    if: >
      github.event_name != 'schedule' && (
        contains(fromJson('["refs/heads/main", "refs/heads/dev"]'), github.ref) ||
        contains(fromJson('["main", "dev"]'), github.base_ref)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist/

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./dist/manifest.json');
            const required = ['manifest_version', 'name', 'version'];
            const missing = required.filter(f => !m[f]);
            if (missing.length) {
              console.error('Missing manifest fields:', missing.join(', '));
              process.exit(1);
            }
            if (m.manifest_version !== 3) {
              console.error('Must use Manifest V3. Got:', m.manifest_version);
              process.exit(1);
            }
            console.log('✅ Manifest valid:', m.name, m.version);
          "

      - name: Check extension size
        run: |
          SIZE=$(du -sk dist/ | cut -f1)
          echo "Extension size: ${SIZE}KB"
          # Chrome Web Store limit is 128MB — warn if approaching
          if [ "$SIZE" -gt 50000 ]; then
            echo "⚠️  Extension is larger than 50MB — review before publishing"
          fi

  # ── Weekly security scan ─────────────────────────────────────────────────
  security-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: forgedTechApps/.github/.github/workflows/reusable-security-scan.yml@v1
    with:
      language: javascript-typescript
      enable-zap: false
    secrets: inherit
