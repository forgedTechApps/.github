name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci:
    uses: forgedTech/.github/.github/workflows/reusable-ci-node.yml@main
    with:
      node-version: '20'
      coverage-threshold: '80'
      test-command: 'npm run test:ci'
      # Chrome extensions build to a dist/ folder — no server to start
      build-command: 'npm run build'
    secrets: inherit

  # ── Extension package verification ───────────────────────────────────────
  # Validates the built extension can be loaded into Chrome.
  # Runs after ci passes — only on PRs to main and main branch.
  validate-extension:
    needs: ci
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist/

      - name: Validate manifest.json
        run: |
          # Verify manifest exists and has required fields
          node -e "
            const m = require('./dist/manifest.json');
            const required = ['manifest_version', 'name', 'version'];
            const missing = required.filter(f => !m[f]);
            if (missing.length) {
              console.error('Missing manifest fields:', missing.join(', '));
              process.exit(1);
            }
            if (m.manifest_version !== 3) {
              console.error('Must use Manifest V3. Got:', m.manifest_version);
              process.exit(1);
            }
            console.log('✅ Manifest valid:', m.name, m.version);
          "

      - name: Check extension size
        run: |
          SIZE=$(du -sk dist/ | cut -f1)
          echo "Extension size: ${SIZE}KB"
          # Chrome Web Store limit is 128MB — warn if approaching
          if [ "$SIZE" -gt 50000 ]; then
            echo "⚠️  Extension is larger than 50MB — review before publishing"
          fi
